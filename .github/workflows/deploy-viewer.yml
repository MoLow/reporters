name: deploy-viewer

on:
  push:
    branches: [main]
    paths:
      - 'packages/web/**'
      - 'packages/tree-core/**'
      - '.github/workflows/deploy-viewer.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - run: yarn install --immutable
      - run: yarn workspace @reporters/web build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/web/dist/viewer
      - id: deploy
        uses: actions/deploy-pages@v4
